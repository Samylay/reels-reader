<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reel Inbox Scraper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      background: #fafafa;
      color: #262626;
    }
    .header {
      background: #0095f6;
      color: white;
      padding: 12px 16px;
      font-weight: 700;
      font-size: 15px;
    }
    .content { padding: 12px 16px; }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #0095f6; color: white; }
    .btn-secondary { background: #efefef; color: #262626; }
    .btn-send { background: #00c853; color: white; }
    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    .status.info { background: #e3f2fd; color: #0d47a1; display: block; }
    .status.success { background: #e8f5e9; color: #1b5e20; display: block; }
    .status.error { background: #ffebee; color: #b71c1c; display: block; }
    .counts { font-size: 12px; color: #666; margin-top: 8px; }
    .footer {
      border-top: 1px solid #efefef;
      padding: 8px 16px;
      font-size: 11px;
      color: #999;
    }
    .footer a { color: #0095f6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">📥 Reel Inbox Scraper</div>
  <div class="content">
    <button id="btn-load-all" class="btn btn-primary">⬆️ Load all &amp; scan</button>
    <button id="btn-scan-now" class="btn btn-secondary">🔍 Scan now</button>
    <button id="btn-send-last" class="btn btn-send">🚀 Send last batch</button>
    <div id="status" class="status"></div>
    <div id="counts" class="counts"></div>
  </div>
  <div class="footer">
    <a href="#" id="options-link">⚙️ Options (backend URL)</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>

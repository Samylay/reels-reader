<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reel Inbox Scraper — Options</title>
  <style>
    * { box-sizing: border-box; }
    body {
      max-width: 500px;
      margin: 40px auto;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
      color: #262626;
      padding: 0 16px;
    }
    h1 { font-size: 20px; margin-bottom: 24px; color: #0095f6; }
    label { display: block; font-weight: 600; margin-bottom: 6px; }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #dbdbdb;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    input[type="text"]:focus { outline: 2px solid #0095f6; border-color: transparent; }
    button {
      background: #0095f6;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #007fd4; }
    #save-status {
      margin-top: 12px;
      font-size: 13px;
      color: #00c853;
      display: none;
    }
    .hint { font-size: 12px; color: #888; margin-top: -12px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h1>⚙️ Reel Inbox Scraper Options</h1>

  <label for="endpoint">Backend endpoint URL</label>
  <input type="text" id="endpoint" placeholder="http://localhost:8787" />
  <p class="hint">The local backend that receives scraped posts via POST /ingest. Default: http://localhost:8787</p>

  <button id="save-btn">Save</button>
  <div id="save-status">✓ Saved!</div>

  <script src="options.js"></script>
</body>
</html>
